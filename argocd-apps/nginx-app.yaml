apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kubernetes.github.io/ingress-nginx'
    targetRevision: 4.10.0
    chart: ingress-nginx
    helm:
      values: |
        controller:
          service:
            annotations:
              service.beta.kubernetes.io/azure-load-balancer-resource-group: "MC_aks-prod-rg_aks-prod-cluster_westeurope"
              service.beta.kubernetes.io/azure-load-balancer-ipv4: "40.113.133.141"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true