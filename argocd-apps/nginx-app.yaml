apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.10.0
    chart: ingress-nginx
    # --- Wstrzyknięcie etykiety DNS dla Azure ---
    helm:
      values: |
        controller:
          service:
            annotations:
              service.beta.kubernetes.io/azure-dns-label-name: "traffic-guard"
    # --------------------------------------------------------------
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true